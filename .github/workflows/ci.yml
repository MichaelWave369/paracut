name: ParaCut CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install
        run: pnpm install

      - name: Typecheck
        run: pnpm typecheck

      - name: Smoke test
        run: pnpm smoke
